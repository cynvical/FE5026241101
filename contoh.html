<!DOCTYPE html>
<html lang="en">
<head>
  <title>Belajar Custom Forms Bootstrap</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="container">

  <div class="row">
    <div class="col">
      <h1>Custom Forms</h1>
      <p>
        Fayza Vicka K/5026241101
      </p>
    </div>
  </div>

  <form>

    <div class="row">
      <div class="col">
        <p>Custom Switch<p>
        <div class="custom-control custom-switch">
          <input type="checkbox" class="custom-control-input" id="switch1">
          <label class="custom-control-label" for="switch1">Toggle me</label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <p>Custom Radio<p>
        <div class="custom-control custom-radio">
          <input type="radio" class="custom-control-input" id="radio1" name="example1">
          <label class="custom-control-label" for="radio1">Custom radio</label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <p>Inline Radio</p>

        <div class="custom-control custom-radio custom-control-inline">
          <input type="radio" class="custom-control-input" id="radio2" name="example">
          <label class="custom-control-label" for="radio2">Custom radio 1</label>
        </div>

        <div class="custom-control custom-radio custom-control-inline">
          <input type="radio" class="custom-control-input" id="radio3" name="example">
          <label class="custom-control-label" for="radio3">Custom radio 2</label>
        </div>

      </div>
    </div>

    <div class="row">
      <div class="col">
        <p>Custom Select</p>
        <select name="cars" class="custom-select">
          <option selected>Custom Select Menu</option>
          <option value="volvo">Volvo</option>
          <option value="fiat">Fiat</option>
          <option value="audi">Audi</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <p>Custom Range</p>
        <label for="customRange">Range</label>
        <input type="range" class="custom-range" id="customRange">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <p>Upload File</p>
        <div class="custom-file">
          <input type="file" class="custom-file-input" id="customFile">
          <label class="custom-file-label" for="customFile">Choose file</label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </div>

  </form>

</div>

<script>
$(".custom-file-input").on("change", function() {
  var fileName = $(this).val().split("\\\\").pop();
  $(this).siblings(".custom-file-label").addClass("selected").html(fileName);
});
</script>

</body>
</html>
